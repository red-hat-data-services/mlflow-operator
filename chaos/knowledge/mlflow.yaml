operator:
  name: mlflow-operator
  namespace: redhat-ods-applications
  repository: https://github.com/opendatahub-io/mlflow-operator

components:
  - name: mlflow-operator-controller-manager
    controller: MLflowReconciler
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: mlflow-operator-controller-manager
        namespace: redhat-ods-applications
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: mlflow-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: mlflow-operator-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: mlflow-operator-manager-role
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: mlflow-operator-manager-rolebinding
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: mlflow-operator-metrics-auth-role
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: mlflow-operator-metrics-auth-rolebinding
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: mlflow-operator-metrics-reader
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        name: mlflow-operator-manager-role
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        name: mlflow-operator-leader-election-role
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: mlflow-operator-manager-rolebinding
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: mlflow-operator-leader-election-rolebinding
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: Service
        name: mlflow-operator-controller-manager-metrics-service
        namespace: redhat-ods-applications
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: a5eb1b3b.opendatahub.io
        namespace: redhat-ods-applications
      - apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        name: controller-manager-metrics-monitor
        namespace: redhat-ods-applications
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: mlflow-operator-controller-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

  - name: mlflow
    controller: MLflowReconciler
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: mlflow
        namespace: redhat-ods-applications
        labels:
          app: mlflow
          component: mlflow
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: Service
        name: mlflow
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: ServiceAccount
        name: mlflow-sa
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: PersistentVolumeClaim
        name: mlflow-pvc
        namespace: redhat-ods-applications
      - apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: mlflow
        namespace: redhat-ods-applications
      - apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: mlflow-migration
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: mlflow
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: mlflow
      - apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        name: mlflow-metrics-monitor
        namespace: redhat-ods-applications
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: mlflow
        namespace: redhat-ods-applications
      - apiVersion: console.openshift.io/v1
        kind: ConsoleLink
        name: mlflow
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: mlflow
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
