apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
spec:
  template:
    spec:
      containers:
        - name: postgres
          # Override the entrypoint to enable SSL using certs from the
          # postgres-tls-certs Secret.  Detects the image entrypoint
          # (UBI, upstream, or bare binary) so this works across variants.
          command: ["/bin/sh", "-c"]
          args:
            - |
              openssl req -new -x509 -days 3650 -nodes \
                -subj "/CN=postgres-service" \
                -out /ssl/server.crt \
                -keyout /ssl/server.key
              chmod 600 /ssl/server.key

              SSL_ARGS=(-c ssl=on -c ssl_cert_file=/ssl/server.crt -c ssl_key_file=/ssl/server.key)

              if command -v docker-entrypoint.sh >/dev/null 2>&1; then
                exec docker-entrypoint.sh postgres "${SSL_ARGS[@]}"
              elif [ -x /usr/bin/run-postgresql ]; then
                exec /usr/bin/run-postgresql "${SSL_ARGS[@]}"
              else
                exec postgres "${SSL_ARGS[@]}"
              fi
          volumeMounts:
            - name: ssl-certs
              mountPath: /ssl
      volumes:
        - name: ssl-certs
          emptyDir: {}
