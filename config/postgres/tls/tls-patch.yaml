apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
spec:
  template:
    spec:
      containers:
        - name: postgres
          # Generate a self-signed TLS cert at startup using the openssl binary
          # already present in the postgres (Debian-based) image, then hand off
          # to the standard entrypoint with SSL flags.  The key is written to an
          # emptyDir so it is owned by the current user and chmod 600 works even
          # under OpenShift's arbitrary-UID SCC.
          command: ["/bin/sh", "-c"]
          args:
            - |
              openssl req -new -x509 -days 3650 -nodes \
                -subj "/CN=postgres-service" \
                -out /ssl/server.crt \
                -keyout /ssl/server.key
              chmod 600 /ssl/server.key
              exec docker-entrypoint.sh postgres \
                -c ssl=on \
                -c ssl_cert_file=/ssl/server.crt \
                -c ssl_key_file=/ssl/server.key
          volumeMounts:
            - name: ssl-certs
              mountPath: /ssl
      volumes:
        - name: ssl-certs
          emptyDir: {}
