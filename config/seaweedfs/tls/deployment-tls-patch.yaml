# JSON 6902 patch: append TLS flags to the SeaweedFS server args and mount
# the seaweedfs-tls-certs Secret (created by deploy.py before kustomize apply).
# SeaweedFS does not enforce strict key-file permissions, so defaultMode 0644 works.
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: '-s3.certFile=/tls/tls.crt'
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: '-s3.keyFile=/tls/tls.key'
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: tls-certs
    mountPath: /tls
    readOnly: true
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: tls-certs
    secret:
      secretName: seaweedfs-tls-certs
      defaultMode: 0644
