apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Chain: base → openshift (secctx patches) → openshift-tls (TLS patches)
resources:
  - ../openshift

patches:
  - path: deployment-tls-patch.yaml
    target:
      kind: Deployment
      name: seaweedfs
  - path: init-job-tls-patch.yaml
    target:
      kind: Job
      name: init-seaweedfs
