name: "Collect Kubernetes debug logs"
description: "Collect namespace-scoped MLflow operator debug artifacts into a directory"

inputs:
  debug_namespace:
    description: "Namespace to inspect for MLflow operator resources"
    required: true
  output_dir:
    description: "Directory where debug artifacts are written"
    required: false
    default: "debug-logs"

runs:
  using: "composite"
  steps:
    - name: Collect debug logs
      shell: bash
      env:
        DEBUG_NAMESPACE: ${{ inputs.debug_namespace }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
      run: |
        set -euo pipefail

        echo "🔍 Collecting debug information..."
        mkdir -p "${OUTPUT_DIR}"

        kubectl get namespaces > "${OUTPUT_DIR}/namespaces.txt" 2>&1 || true

        if ! kubectl get namespace "${DEBUG_NAMESPACE}" >/dev/null 2>&1; then
            echo "Namespace ${DEBUG_NAMESPACE} not found; skipping namespace-scoped debug collection." > "${OUTPUT_DIR}/namespace.txt"
            exit 0
        fi

        kubectl get mlflow -n "${DEBUG_NAMESPACE}" -o yaml > "${OUTPUT_DIR}/mlflow-cr.yaml" 2>&1 || true
        kubectl get pods -n "${DEBUG_NAMESPACE}" -o wide > "${OUTPUT_DIR}/pods.txt" 2>&1 || true
        kubectl get deployments -n "${DEBUG_NAMESPACE}" -o wide > "${OUTPUT_DIR}/deployments.txt" 2>&1 || true
        kubectl get jobs -n "${DEBUG_NAMESPACE}" -o wide > "${OUTPUT_DIR}/jobs.txt" 2>&1 || true
        kubectl get svc -n "${DEBUG_NAMESPACE}" -o wide > "${OUTPUT_DIR}/services.txt" 2>&1 || true
        kubectl get events -n "${DEBUG_NAMESPACE}" --sort-by='.lastTimestamp' > "${OUTPUT_DIR}/events.txt" 2>&1 || true

        for deployment in mlflow controller-manager; do
            kubectl describe deployment "${deployment}" -n "${DEBUG_NAMESPACE}" > "${OUTPUT_DIR}/${deployment}-deployment.describe.txt" 2>&1 || true
        done

        while IFS='|' read -r label suffix; do
            label="${label#"${label%%[![:space:]]*}"}"
            mapfile -t PODS < <(kubectl get pods -n "${DEBUG_NAMESPACE}" -l "${label}" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null | tr ' ' '\n' | sed '/^$/d')
            if [[ "${#PODS[@]}" -eq 0 ]]; then
                continue
            fi

            for pod in "${PODS[@]}"; do
                echo "📋 Collecting logs for pod: ${pod}"
                kubectl describe pod "${pod}" -n "${DEBUG_NAMESPACE}" > "${OUTPUT_DIR}/${pod}${suffix}.describe.txt" 2>&1 || true
                kubectl logs "${pod}" -n "${DEBUG_NAMESPACE}" --all-containers=true > "${OUTPUT_DIR}/${pod}${suffix}.log" 2>&1 || true
                kubectl logs "${pod}" -n "${DEBUG_NAMESPACE}" --all-containers=true --previous > "${OUTPUT_DIR}/${pod}${suffix}.previous.log" 2>&1 || true
            done
        done <<'EOF'
        app=mlflow|
        control-plane=controller-manager|-operator
        mlflow.opendatahub.io/migration-job=true|-migration
        app=seaweedfs|-seaweedfs
        app=mlflow-postgres|-postgres
        EOF
