name: "Build and push container image"
description: "Builds and pushes a container image to quay.io from a source branch."
inputs:
  IMAGE_REPO:
    description: "Quay image repo name."
    required: true
  DOCKERFILE:
    description: "Path to Dockerfile."
    required: true
  GH_REPO:
    description: "GH org/repo that contains the dockerfile to source."
    required: true
  OVERWRITE:
    default: "false"
    description: "Whether to overwrite an existing image tag if it already exists. Set to 'true' to allow overwrite."
    required: true
  QUAY_ORG:
    description: "Quay.io organization/namespace for the image."
    required: true
  QUAY_ID:
    description: "Quay.io robot username (use secrets.QUAY_ROBOT_USERNAME)."
    required: true
  QUAY_TOKEN:
    description: "Quay.io robot token (use secrets.QUAY_ROBOT_TOKEN)."
    required: true
  PLATFORMS:
    description: "Comma-separated OCI target platforms to build and push."
    default: "linux/amd64"
    required: false
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        repository: ${{ inputs.GH_REPO }}
        ref: ${{ env.SOURCE_BRANCH }}
        path: build
    - name: Login to Quay.io
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        username: ${{ inputs.QUAY_ID }}
        password: ${{ inputs.QUAY_TOKEN }}
        registry: quay.io
    - name: Set up QEMU
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      # Use the action default ('all') so QEMU can satisfy any
      # platform requested via the dynamic PLATFORMS input.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
    # Tags in quay stick around as objects in api, when deleted quay adds "end_ts" time stamp on the tag.
    # To determine a tag is deleted, we need to check for the presence of this tag.
    # Also note there can be multiple tags created/deleted, thus we have 4 cases:
    # Case 1: Only 1 tag was ever created "tags: [{name:..},]"   -- no end_ts field
    # Case 2: No tag was ever created "tags: []"
    # Case 3: >1 tags were created, but they were all deleted at some point [{name:..., end_ts,..},....]  -- note they all have "end_ts" field.
    # Case 4: >1 tags were created, but the most recent one was never deleted (same as case 3, but the latest tag does not have "end_ts".
    - name: Check if Image already exists
      shell: bash
      if: inputs.OVERWRITE == 'false'
      env:
        IMAGE: quay.io/${{ inputs.QUAY_ORG }}/${{ inputs.IMAGE_REPO }}:${{ env.TARGET_IMAGE_TAG }}
        OVERWRITE_VALUE: ${{ inputs.OVERWRITE }}
        QUAY_ORG_VALUE: ${{ inputs.QUAY_ORG }}
        IMAGE_REPO_VALUE: ${{ inputs.IMAGE_REPO }}
        TARGET_IMAGE_TAG_VALUE: ${{ env.TARGET_IMAGE_TAG }}
      run: |
        set -euo pipefail
        printf '%s\n' "$OVERWRITE_VALUE"

        tags="$(curl --request GET "https://quay.io/api/v1/repository/${QUAY_ORG_VALUE}/${IMAGE_REPO_VALUE}/tag/?specificTag=${TARGET_IMAGE_TAG_VALUE}")"
        latest_tag_has_end_ts="$(printf '%s' "$tags" | yq '.tags' - | yq 'sort_by(.start_ts) | reverse' - -P | yq '.[0].end_ts' -)"
        notempty="$(printf '%s' "$tags" | yq '.tags' - | yq any)"

        # Image only exists if there is a tag that does not have "end_ts" (i.e. it is still present).
        if [[ "$notempty" == "true" && "$latest_tag_has_end_ts" == "null" ]]; then
            printf '::error::The image %s already exists\n' "$IMAGE"
            exit 1
        else
            printf '%s\n' "Image does not exist...proceeding with build & push."
        fi
    - name: Build and push image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: build
        file: build/${{ inputs.DOCKERFILE }}
        platforms: ${{ inputs.PLATFORMS }}
        push: true
        tags: quay.io/${{ inputs.QUAY_ORG }}/${{ inputs.IMAGE_REPO }}:${{ env.TARGET_IMAGE_TAG }}
