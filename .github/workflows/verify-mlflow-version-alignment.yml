name: Verify MLflow Version Alignment

on:
  schedule:
    - cron: "0 10 * * *"
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/workflows/verify-mlflow-version-alignment.yml"
      - "config/base/params.env"
      - "config/overlays/kind/params.env"
      - "config/component_metadata.yaml"
      - "Dockerfile"
      - "Makefile"
      - "test/scripts/verify_mlflow_version_alignment.py"
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/verify-mlflow-version-alignment.yml"
      - "config/base/params.env"
      - "config/overlays/kind/params.env"
      - "config/component_metadata.yaml"
      - "Dockerfile"
      - "Makefile"
      - "test/scripts/verify_mlflow_version_alignment.py"

jobs:
  verify-mlflow-version-alignment:
    if: github.repository_owner == 'opendatahub-io'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify default MLflow image version alignment
        shell: bash
        run: |
          python3 test/scripts/verify_mlflow_version_alignment.py \
            --params-env config/base/params.env \
            --params-env config/overlays/kind/params.env
