name: Verify MLflow Version Alignment

# This workflow exists for the scheduled ODH default-image alignment check.
# Push and pull request validation for the same defaults lives in integration-tests.yml.

on:
  schedule:
    - cron: '0 10 * * *'

jobs:
  verify-mlflow-version-alignment:
    if: github.repository_owner == 'opendatahub-io'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Verify default MLflow image version alignment
        shell: bash
        run: |
          python3 test/scripts/verify_mlflow_version_alignment.py \
            --params-env config/base/params.env \
            --params-env config/overlays/kind/params.env
