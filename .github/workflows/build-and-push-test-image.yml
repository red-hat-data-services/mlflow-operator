name: Build and Push Test Image

# Builds and pushes the mlflow-tests image to quay.io/opendatahub.
# Konflux also builds on push (.tekton/mlflow-tests-push*.yaml) but pushes
# to quay.io/rhoai which is not publicly accessible. GHA builds ensure
# the image is available in the public opendatahub org for CI consumers.

on:
  push:
    branches:
      - main
      - "release-[0-9]*"
      - "rhoai-[0-9]*"
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name to use for image tag'
        required: false
        default: ''

env:
  QUAY_ORG: opendatahub
  QUAY_ID: ${{ secrets.QUAY_ROBOT_USERNAME }}
  QUAY_TOKEN: ${{ secrets.QUAY_ROBOT_TOKEN }}
  IMAGE_REPO: mlflow-tests
  DOCKERFILE_PATH: mlflow-tests/images/Dockerfile.konflux

jobs:
  build-test-image:
    name: Build and Push Test Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine image tag
        id: determine_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BRANCH: ${{ inputs.branch_name }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_BRANCH" ]]; then
            # Use manually provided branch name
            BRANCH_NAME="$INPUT_BRANCH"
          else
            # Use the current branch name, sanitizing it for use as a Docker tag
            BRANCH_NAME="$REF_NAME"
          fi

          # Sanitize branch name for Docker tag (replace / with -, remove invalid chars)
          TAG_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')

          # Prefix tags to avoid collisions with Konflux builds.
          # Konflux pushes {{target_branch}} directly (e.g. main, rhoai-3.4).
          if [[ "$REPO" == red-hat-data-services/* ]]; then
            # rhoai-* branches are already namespaced
            if [[ ! "$TAG_NAME" =~ ^rhoai- ]]; then
              TAG_NAME="rhds-${TAG_NAME}"
            fi
          else
            TAG_NAME="odh-${TAG_NAME}"
          fi

          {
            echo "branch_name=${BRANCH_NAME}"
            echo "tag_name=${TAG_NAME}"
            echo "full_image=quay.io/${{ env.QUAY_ORG }}/${{ env.IMAGE_REPO }}:${TAG_NAME}"
          } >> "$GITHUB_OUTPUT"

          echo "Building image for branch: $BRANCH_NAME"
          echo "Docker tag will be: $TAG_NAME"
          echo "Full image name: quay.io/${{ env.QUAY_ORG }}/${{ env.IMAGE_REPO }}:${TAG_NAME}"

      - name: Build and push test image
        uses: ./.github/actions/build
        env:
          TARGET_IMAGE_TAG: ${{ steps.determine_tag.outputs.tag_name }}
          SOURCE_BRANCH: ${{ steps.determine_tag.outputs.branch_name }}
        with:
          OVERWRITE: true
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          DOCKERFILE: ${{ env.DOCKERFILE_PATH }}
          GH_REPO: ${{ github.repository }}
          QUAY_ORG: ${{ env.QUAY_ORG }}
          QUAY_ID: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Test Image Build Summary"
            echo ""
            echo "**Branch:** ${{ steps.determine_tag.outputs.branch_name }}"
            echo "**Image Tag:** ${{ steps.determine_tag.outputs.tag_name }}"
            echo "**Full Image:** \`${{ steps.determine_tag.outputs.full_image }}\`"
            echo ""
            echo "**Status:** ✅ Built and pushed successfully"
          } >> "$GITHUB_STEP_SUMMARY"
