name: Upgrade Tests

on:
  push:
    branches:
      - "main"
  pull_request:

env:
  IMG: "localhost/mlflow-operator-upgrade:v0.0.1"
  MLFLOW_SEED_IMAGE: "localhost/mlflow-seed:3.10.0"
  MLFLOW_SEED_BASE_IMAGE: "quay.io/opendatahub/mlflow:odh-stable"
  CLUSTER_NAME: "mlflow-upgrade"
  NAMESPACE: "opendatahub"

jobs:
  upgrade-tests:
    name: Run upgrade path (${{ matrix.backend_store }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        backend_store:
          - sqlite
          - postgres
    steps:
      - name: Clone the code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.12"

      - name: Create Kind cluster
        uses: ./.github/actions/create-cluster
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          k8s_version: "v1.34.0"

      - name: Build operator image
        run: make docker-build IMG=${{ env.IMG }}

      - name: Load operator image into Kind cluster
        run: kind load docker-image ${{ env.IMG }} --name ${{ env.CLUSTER_NAME }}

      - name: Build MLflow 3.10.0-compatible seed operator image
        env:
          SEED_OPERATOR_IMG: "localhost/mlflow-operator-upgrade-seed:v0.0.1"
        run: |
          make docker-build IMG="${SEED_OPERATOR_IMG}" SUPPORTED_MLFLOW_VERSION_OVERRIDE=3.10.0

      - name: Load seed operator image into Kind cluster
        env:
          SEED_OPERATOR_IMG: "localhost/mlflow-operator-upgrade-seed:v0.0.1"
        run: kind load docker-image "${SEED_OPERATOR_IMG}" --name ${{ env.CLUSTER_NAME }}

      - name: Build MLflow 3.10.0 seed image
        run: docker build --pull --build-arg BASE_IMAGE=${{ env.MLFLOW_SEED_BASE_IMAGE }} -f test/e2e/images/mlflow-3.10.0.Dockerfile -t ${{ env.MLFLOW_SEED_IMAGE }} .

      - name: Load MLflow 3.10.0 seed image into Kind cluster
        run: kind load docker-image ${{ env.MLFLOW_SEED_IMAGE }} --name ${{ env.CLUSTER_NAME }}

      - name: Install deploy helper dependencies
        run: python3 -m pip install pyyaml kubernetes

      - name: Deploy seeded MLflow 3.10.0 instance
        shell: bash
        env:
          SEED_OPERATOR_IMG: "localhost/mlflow-operator-upgrade-seed:v0.0.1"
        run: |
          DEPLOY_ARGS=(
            --namespace "${{ env.NAMESPACE }}"
            --mlflow-operator-image "${SEED_OPERATOR_IMG}"
            --mlflow-image "${{ env.MLFLOW_SEED_IMAGE }}"
            --backend-store "${{ matrix.backend_store }}"
            --registry-store "${{ matrix.backend_store }}"
            --artifact-storage file
            --serve-artifacts true
          )

          python3 .github/actions/deploy/deploy.py "${DEPLOY_ARGS[@]}"

      - name: Wait for seeded MLflow 3.10.0 migration to complete
        shell: bash
        run: |
          kubectl wait --for=jsonpath='{.status.version}'=3.10.0 mlflow/mlflow --timeout=300s

      - name: Run upgrade e2e tests
        run: make test-e2e-upgrade E2E_IMG=${{ env.IMG }} MLFLOW_SEED_IMAGE=${{ env.MLFLOW_SEED_IMAGE }}
