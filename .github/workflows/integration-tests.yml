name: MLflow Runtime Integration Tests

# This workflow owns push, pull request, and manual MLflow runtime validation.
# The scheduled ODH default-image alignment check lives in verify-mlflow-version-alignment.yml.

env:
  NAMESPACE: 'opendatahub'
  INTEGRATION_CLUSTER_NAME: 'mlflow'
  PYTEST_ARGS: '-v --tb=short --strict-markers --disable-warnings'
  AWS_ACCESS_KEY_ID: 'minio'
  AWS_SECRET_ACCESS_KEY: 'minio123'
  AWS_S3_BUCKET: 'mlpipeline'
  MLFLOW_RUNTIME_ARTIFACT: 'mlflow-runtime-image'
  MLFLOW_RUNTIME_IMAGE: 'localhost/mlflow-runtime:ci'
  MLFLOW_TESTS_RUNTIME_ARTIFACT: 'mlflow-tests-image'
  MLFLOW_TESTS_RUNTIME_IMAGE: 'localhost/mlflow-tests:ci'
  OPERATOR_RUNTIME_ARTIFACT: 'mlflow-operator-image'
  OPERATOR_RUNTIME_IMAGE: 'localhost/mlflow-operator:ci'

on:
  workflow_call:
    inputs:
      mlflow_repository:
        description: 'Repository to build MLflow image from (e.g., opendatahub-io/mlflow)'
        type: string
        required: false
        default: ''
      mlflow_ref:
        description: 'Git ref to checkout for MLflow build (e.g., refs/pull/42/merge)'
        type: string
        required: false
        default: ''

  push:
    branches:
      - main

  pull_request:

jobs:
  build-mlflow-runtime-image:
    permissions:
      contents: read
    name: Build MLflow runtime image
    runs-on: ubuntu-latest
    outputs:
      source_repository: ${{ steps.configure.outputs.source_repository }}
      source_ref: ${{ steps.configure.outputs.source_ref }}
    steps:
      - name: Resolve MLflow source build settings
        id: configure
        shell: bash
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          TARGET_REF: ${{ github.base_ref || github.ref_name }}
          MLFLOW_REPOSITORY: ${{ inputs.mlflow_repository }}
          MLFLOW_REF: ${{ inputs.mlflow_ref }}
        run: |
          # Build from source when called with explicit MLflow inputs
          if [[ -n "$MLFLOW_REPOSITORY" && -n "$MLFLOW_REF" ]]; then
            SOURCE_REPOSITORY="$MLFLOW_REPOSITORY"
            SOURCE_REF="$MLFLOW_REF"
          else
            if [[ "$REPOSITORY_OWNER" == "red-hat-data-services" ]]; then
              SOURCE_REPOSITORY="red-hat-data-services/mlflow"
            else
              SOURCE_REPOSITORY="opendatahub-io/mlflow"
            fi

            # Build the MLflow branch that corresponds to the operator branch under test.
            # Examples:
            # - ODH PR to operator main -> opendatahub-io/mlflow master
            # - ODH PR to operator release-3.4 -> opendatahub-io/mlflow release-3.4
            # - RHDS PR to operator main -> red-hat-data-services/mlflow main
            # - RHDS PR to operator rhoai-3.4 -> red-hat-data-services/mlflow rhoai-3.4
            if [[ "$REPOSITORY_OWNER" == "opendatahub-io" && "$TARGET_REF" == "main" ]]; then
              SOURCE_REF="master"
            else
              SOURCE_REF="$TARGET_REF"
            fi
          fi

          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout MLflow source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ steps.configure.outputs.source_repository }}
          ref: ${{ steps.configure.outputs.source_ref }}
          path: mlflow-upstream
          persist-credentials: false

      - name: Resolve MLflow Dockerfile
        id: resolve-mlflow-dockerfile
        shell: bash
        run: |
          if [[ -f mlflow-upstream/Dockerfile.konflux ]]; then
            echo "path=mlflow-upstream/Dockerfile.konflux" >> "$GITHUB_OUTPUT"
          else
            echo "path=mlflow-upstream/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build MLflow image archive
        shell: bash
        run: |
          mkdir -p runtime-image
          docker build -f "${{ steps.resolve-mlflow-dockerfile.outputs.path }}" -t "${{ env.MLFLOW_RUNTIME_IMAGE }}" mlflow-upstream
          docker save -o "runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar" "${{ env.MLFLOW_RUNTIME_IMAGE }}"

      - name: Upload MLflow image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar
          retention-days: 1

  build-mlflow-operator-image:
    permissions:
      contents: read
    name: Build MLflow operator image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout operator repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Override to the operator repo when called from another repo
          repository: ${{ inputs.mlflow_repository && format('{0}/mlflow-operator', github.repository_owner) || github.repository }}
          persist-credentials: false

      - name: Resolve operator Dockerfile
        id: resolve-operator-dockerfile
        shell: bash
        run: |
          if [[ -f Dockerfile.konflux ]]; then
            echo "path=Dockerfile.konflux" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build MLflow operator image archive
        shell: bash
        run: |
          mkdir -p operator-image
          docker build -f "${{ steps.resolve-operator-dockerfile.outputs.path }}" -t "${{ env.OPERATOR_RUNTIME_IMAGE }}" .
          docker save -o "operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar" "${{ env.OPERATOR_RUNTIME_IMAGE }}"

      - name: Upload MLflow operator image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.OPERATOR_RUNTIME_ARTIFACT }}
          path: operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar
          retention-days: 1

  build-mlflow-tests-image:
    permissions:
      contents: read
    name: Build MLflow tests image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout operator repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Override to the operator repo when called from another repo
          repository: ${{ inputs.mlflow_repository && format('{0}/mlflow-operator', github.repository_owner) || github.repository }}
          persist-credentials: false

      - name: Build MLflow tests image archive
        shell: bash
        run: |
          mkdir -p test-image
          docker build -f mlflow-tests/images/Dockerfile.konflux -t "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}" .
          docker save -o "test-image/${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}.tar" "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}"

      - name: Upload MLflow tests image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}
          path: test-image/${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}.tar
          retention-days: 1

  integration-tests:
    needs: [build-mlflow-runtime-image, build-mlflow-operator-image, build-mlflow-tests-image]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        k8s_version: ["v1.34.0"]
        serve_artifacts: ["true", "false"]
        artifact_backends: ["file", "s3"]
        backend_store: ["sqlite", "postgres"]
        registry_store: ["sqlite", "postgres"]
        include:
          - k8s_version: "v1.29.0"
            backend_store: "sqlite"
            artifact_backends: "file"
            serve_artifacts: "true"
            registry_store: "sqlite"
            workspace_label_selector: '{"matchLabels":{"mlflow-enabled":"true"}}'
          - k8s_version: "v1.29.0"
            backend_store: "postgres"
            artifact_backends: "s3"
            serve_artifacts: "false"
            registry_store: "postgres"
          # Jenkins runs multiple backend suites in one test-run.sh invocation; keep
          # this row so CI exercises the same file -> s3 reuse path.
          - k8s_version: "v1.34.0"
            backend_store: "postgres"
            artifact_backends: "file,s3"
            serve_artifacts: "true"
            registry_store: "postgres"
          # TLS variant — validates MLflow connects to postgres + s3 over TLS.
          # Only serve_artifacts=true so the test runner doesn't need direct
          # TLS access to the backends (MLflow proxies everything).
          - k8s_version: "v1.34.0"
            backend_store: "postgres"
            artifact_backends: "s3"
            serve_artifacts: "true"
            registry_store: "postgres"
            postgres_tls: "true"
            seaweedfs_tls: "true"
      fail-fast: false
    name: MLflow Integration tests - K8sVersion=${{ matrix.k8s_version }} serve_artifacts=${{ matrix.serve_artifacts }} artifact_backends=${{ matrix.artifact_backends }} backend_store=${{ matrix.backend_store }} registry_store=${{ matrix.registry_store }} postgres_tls=${{ matrix.postgres_tls || 'false' }} seaweedfs_tls=${{ matrix.seaweedfs_tls || 'false' }}

    steps:
      - name: Checkout operator repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Override to the operator repo when called from another repo
          repository: ${{ inputs.mlflow_repository && format('{0}/mlflow-operator', github.repository_owner) || github.repository }}
          persist-credentials: false

      - name: Free up disk space
        uses: kubeflow/pipelines/.github/actions/github-disk-cleanup@3004f974b571840bdb1ed6362c520d3cf566e9c0 # master

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        id: cluster-create
        with:
          version: v0.29.0
          node_image: kindest/node:${{ matrix.k8s_version }}
          cluster_name: ${{ env.INTEGRATION_CLUSTER_NAME }}
          registry: 'true'

      - name: Download MLflow operator image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.OPERATOR_RUNTIME_ARTIFACT }}
          path: operator-image

      - name: Load MLflow operator image into Kind cluster
        shell: bash
        run: |
          docker load -i "operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar"
          kind load docker-image "${{ env.OPERATOR_RUNTIME_IMAGE }}" --name "${{ env.INTEGRATION_CLUSTER_NAME }}"

      - name: Download MLflow runtime image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image

      - name: Load MLflow runtime image into Kind cluster
        shell: bash
        run: |
          docker load -i "runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar"
          kind load docker-image "${{ env.MLFLOW_RUNTIME_IMAGE }}" --name "${{ env.INTEGRATION_CLUSTER_NAME }}"

      - name: Download MLflow tests image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}
          path: test-image

      - name: Load MLflow tests image
        shell: bash
        run: docker load -i "test-image/${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}.tar"

      - name: Run integration tests
        id: run-tests
        continue-on-error: true
        env:
          ARTIFACT_BACKENDS: ${{ matrix.artifact_backends }}
          BACKEND_STORE: ${{ matrix.backend_store }}
          REGISTRY_STORE: ${{ matrix.registry_store }}
          SERVE_ARTIFACTS: ${{ matrix.serve_artifacts }}
          POSTGRES_TLS: ${{ matrix.postgres_tls || 'false' }}
          SEAWEEDFS_TLS: ${{ matrix.seaweedfs_tls || 'false' }}
          WORKSPACE_LABEL_SELECTOR: ${{ matrix.workspace_label_selector || '' }}
        run: |
          mkdir -p test-results
          set +e
          docker run --rm --network host \
            -v "$HOME/.kube:/mlflow/.kube:ro,z" \
            -v "${{ github.workspace }}/test-results:/mlflow/results:z" \
            -e DEPLOY_MLFLOW_OPERATOR=false \
            -e NAMESPACE="${{ env.NAMESPACE }}" \
            -e MLFLOW_OPERATOR_IMAGE="${{ env.OPERATOR_RUNTIME_IMAGE }}" \
            -e MLFLOW_IMAGE="${{ env.MLFLOW_RUNTIME_IMAGE }}" \
            -e BACKEND_STORE="${BACKEND_STORE}" \
            -e REGISTRY_STORE="${REGISTRY_STORE}" \
            -e ARTIFACT_BACKENDS="${ARTIFACT_BACKENDS}" \
            -e SERVE_ARTIFACTS="${SERVE_ARTIFACTS}" \
            -e AWS_ACCESS_KEY_ID="${{ env.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_S3_BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e WORKSPACE_LABEL_SELECTOR="${WORKSPACE_LABEL_SELECTOR}" \
            -e POSTGRES_TLS="${POSTGRES_TLS}" \
            -e SEAWEEDFS_TLS="${SEAWEEDFS_TLS}" \
            -e TEST_RESULTS_DIR="/mlflow/results" \
            "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}" \
            ${{ env.PYTEST_ARGS }}

          TEST_EXIT_CODE=$?
          set -e
          echo "test_exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ $TEST_EXIT_CODE -eq 0 ]; then
            echo "✅ All integration tests passed!"
          else
            echo "❌ Some integration tests failed (exit code: $TEST_EXIT_CODE)"
          fi

          exit $TEST_EXIT_CODE

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        id: upload-report
        if: (!cancelled())
        with:
          name: integration-test-results-${{ matrix.k8s_version }}-${{ matrix.backend_store }}-${{ matrix.registry_store }}-${{ matrix.artifact_backends }}-${{ matrix.serve_artifacts }}-postgres_tls_${{ matrix.postgres_tls || 'false' }}-seaweedfs_tls_${{ matrix.seaweedfs_tls || 'false' }}
          path: test-results/
          retention-days: 30

      - name: Generate test summary
        uses: kubeflow/pipelines/.github/actions/junit-summary@3004f974b571840bdb1ed6362c520d3cf566e9c0 # master
        if: (!cancelled())
        with:
          xml_files: test-results/*.xml
        continue-on-error: true

      - name: Collect integration debug logs
        id: collect-logs
        if: ${{ failure() && !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/collect-debug-logs
        with:
          debug_namespace: ${{ env.NAMESPACE }}

      - name: Upload integration debug logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ failure() && !cancelled() }}
        with:
          name: debug-logs-${{ matrix.k8s_version }}-${{ matrix.backend_store }}-${{ matrix.registry_store }}-${{ matrix.artifact_backends }}-${{ matrix.serve_artifacts }}-postgres_tls_${{ matrix.postgres_tls || 'false' }}-seaweedfs_tls_${{ matrix.seaweedfs_tls || 'false' }}
          path: debug-logs/
          retention-days: 7

      - name: Mark workflow failure if test step failed
        if: steps.run-tests.outcome != 'success' && !cancelled()
        shell: bash
        run: exit 1

  verify-built-mlflow-version-alignment:
    if: ${{ !inputs.mlflow_repository && github.event_name != 'workflow_dispatch' && github.repository_owner == 'red-hat-data-services' }}
    needs: build-mlflow-runtime-image
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download MLflow runtime image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image

      - name: Load built MLflow image
        shell: bash
        run: docker load -i "runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar"

      - name: Verify built MLflow image version alignment
        shell: bash
        run: |
          python3 test/scripts/verify_mlflow_version_alignment.py \
            --mlflow-image "${{ env.MLFLOW_RUNTIME_IMAGE }}"

  verify-default-mlflow-version-alignment:
    if: ${{ !inputs.mlflow_repository && github.event_name != 'workflow_dispatch' && github.repository_owner == 'opendatahub-io' && (github.ref_name == 'main' || github.base_ref == 'main') }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Verify default MLflow image version alignment
        shell: bash
        run: |
          python3 test/scripts/verify_mlflow_version_alignment.py \
            --params-env config/base/params.env \
            --params-env config/overlays/kind/params.env

