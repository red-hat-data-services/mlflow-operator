name: MLflow Upgrade Validation

env:
  NAMESPACE: 'opendatahub'
  AWS_ACCESS_KEY_ID: 'minio'
  AWS_SECRET_ACCESS_KEY: 'minio123'
  AWS_S3_BUCKET: 'mlpipeline'
  MLFLOW_RUNTIME_ARTIFACT: 'mlflow-runtime-image'
  MLFLOW_RUNTIME_IMAGE: 'localhost/mlflow-runtime:ci'
  # Upgrade pytest validation jobs execute this container directly; the build
  # job verifies it bakes the normalized supported MLflow version into BASH_ENV.
  MLFLOW_TESTS_RUNTIME_ARTIFACT: 'mlflow-tests-image'
  MLFLOW_TESTS_RUNTIME_IMAGE: 'localhost/mlflow-tests:ci'
  OPERATOR_RUNTIME_ARTIFACT: 'mlflow-operator-image'
  OPERATOR_RUNTIME_IMAGE: 'localhost/mlflow-operator:ci'
  # Retagged current operator image used as the upgraded target state in the
  # live upgrade end-to-end job.
  UPGRADE_OPERATOR_IMAGE: 'localhost/mlflow-operator-upgrade:v0.0.1'
  UPGRADE_CLUSTER_NAME: 'mlflow-upgrade'
  UPGRADE_VALIDATION_CLUSTER_NAME: 'mlflow-upgrade-validation'
  UPGRADE_TEST_WORKSPACE: 'mlflow-upgrade-test-workspace'
  MLFLOW_SEED_SOURCE_IMAGE: 'quay.io/opendatahub/mlflow@sha256:ad51bbd7f770491da88dc1db3b3c84f7471d25c48026ecb385180b63b18f4c64'
  MLFLOW_SEED_IMAGE: 'localhost/mlflow-seed:3.10.1'

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-mlflow-runtime-image:
    permissions:
      contents: read
    name: Build MLflow runtime image
    runs-on: ubuntu-latest
    outputs:
      source_repository: ${{ steps.configure.outputs.source_repository }}
      source_ref: ${{ steps.configure.outputs.source_ref }}
    steps:
      - name: Resolve MLflow source build settings
        id: configure
        shell: bash
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          TARGET_REF: ${{ github.base_ref || github.ref_name }}
        run: |
          if [[ "$REPOSITORY_OWNER" == "red-hat-data-services" ]]; then
            SOURCE_REPOSITORY="red-hat-data-services/mlflow"
          else
            SOURCE_REPOSITORY="opendatahub-io/mlflow"
          fi

          if [[ "$REPOSITORY_OWNER" == "opendatahub-io" && "$TARGET_REF" == "main" ]]; then
            SOURCE_REF="master"
          else
            SOURCE_REF="$TARGET_REF"
          fi

          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout MLflow source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ steps.configure.outputs.source_repository }}
          ref: ${{ steps.configure.outputs.source_ref }}
          path: mlflow-upstream
          persist-credentials: false

      - name: Resolve MLflow Dockerfile
        id: resolve-mlflow-dockerfile
        shell: bash
        run: |
          if [[ -f mlflow-upstream/Dockerfile.konflux ]]; then
            echo "path=mlflow-upstream/Dockerfile.konflux" >> "$GITHUB_OUTPUT"
          else
            echo "path=mlflow-upstream/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build MLflow image archive
        shell: bash
        run: |
          mkdir -p runtime-image
          docker build -f "${{ steps.resolve-mlflow-dockerfile.outputs.path }}" -t "${{ env.MLFLOW_RUNTIME_IMAGE }}" mlflow-upstream
          docker save -o "runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar" "${{ env.MLFLOW_RUNTIME_IMAGE }}"

      - name: Upload MLflow image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar
          retention-days: 1

  build-mlflow-operator-image:
    permissions:
      contents: read
    name: Build MLflow operator image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Resolve operator Dockerfile
        id: resolve-operator-dockerfile
        shell: bash
        run: |
          if [[ -f Dockerfile.konflux ]]; then
            echo "path=Dockerfile.konflux" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build MLflow operator image archive
        shell: bash
        run: |
          mkdir -p operator-image
          docker build -f "${{ steps.resolve-operator-dockerfile.outputs.path }}" -t "${{ env.OPERATOR_RUNTIME_IMAGE }}" .
          docker save -o "operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar" "${{ env.OPERATOR_RUNTIME_IMAGE }}"

      - name: Upload MLflow operator image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.OPERATOR_RUNTIME_ARTIFACT }}
          path: operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar
          retention-days: 1

  build-mlflow-tests-image:
    permissions:
      contents: read
    name: Build MLflow tests image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Build MLflow tests image archive
        shell: bash
        run: |
          mkdir -p test-image
          docker build -f mlflow-tests/images/Dockerfile.konflux -t "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}" .

      - name: Verify test image baked supported MLflow version
        shell: bash
        run: |
          expected_version="$(python3 scripts/print_supported_mlflow_version.py --component-metadata config/component_metadata.yaml --normalized)"
          actual_version="$(docker run --rm --entrypoint bash "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}" -c 'printf "%s\n" "${MLFLOW_TEST_SUPPORTED_VERSION:?}"')"
          if [ "$actual_version" != "$expected_version" ]; then
            printf '::error::Expected test image to expose MLFLOW_TEST_SUPPORTED_VERSION=%s, but saw %s\n' "$expected_version" "$actual_version"
            exit 1
          fi
          printf 'Verified test image baked supported MLflow version: %s\n' "$actual_version"

      - name: Save MLflow tests image archive
        shell: bash
        run: |
          docker save -o "test-image/${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}.tar" "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}"

      - name: Upload MLflow tests image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}
          path: test-image/${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}.tar
          retention-days: 1

  # Validates the upgrade-tagged pytest machinery itself on the current build
  # without first seeding a historical source deployment.
  current-upgrade-pytest-validation:
    needs: [build-mlflow-runtime-image, build-mlflow-operator-image, build-mlflow-tests-image]
    name: Validate current upgrade pytest flow (${{ matrix.backend_store }}, ${{ matrix.artifact_storage }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        backend_store:
          - sqlite
          - postgres
        artifact_storage:
          - file
          - s3
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Free up disk space
        uses: kubeflow/pipelines/.github/actions/github-disk-cleanup@3004f974b571840bdb1ed6362c520d3cf566e9c0 # master

      - name: Create Kind cluster
        uses: ./.github/actions/create-cluster
        with:
          cluster_name: ${{ env.UPGRADE_VALIDATION_CLUSTER_NAME }}
          k8s_version: "v1.34.0"

      - name: Download MLflow operator image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.OPERATOR_RUNTIME_ARTIFACT }}
          path: operator-image

      - name: Load MLflow operator image into Kind cluster
        shell: bash
        run: |
          docker load -i "operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar"
          kind load docker-image "${{ env.OPERATOR_RUNTIME_IMAGE }}" --name "${{ env.UPGRADE_VALIDATION_CLUSTER_NAME }}"

      - name: Download MLflow runtime image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image

      - name: Load MLflow runtime image into Kind cluster
        shell: bash
        run: |
          docker load -i "runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar"
          kind load docker-image "${{ env.MLFLOW_RUNTIME_IMAGE }}" --name "${{ env.UPGRADE_VALIDATION_CLUSTER_NAME }}"

      - name: Download MLflow tests image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}
          path: test-image

      - name: Load MLflow tests image
        shell: bash
        run: docker load -i "test-image/${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}.tar"

      - name: Run current-version pre-upgrade validation phase
        shell: bash
        env:
          ARTIFACT_BACKENDS: ${{ matrix.artifact_storage }}
          BACKEND_STORE: ${{ matrix.backend_store }}
          REGISTRY_STORE: ${{ matrix.backend_store }}
        run: |
          mkdir -p test-results
          docker run --rm --network host \
            -v "$HOME/.kube:/mlflow/.kube:ro,z" \
            -v "${{ github.workspace }}/test-results:/mlflow/results:z" \
            -e DEPLOY_MLFLOW_OPERATOR=false \
            -e SKIP_CLEANUP=true \
            -e NAMESPACE="${{ env.NAMESPACE }}" \
            -e MLFLOW_OPERATOR_IMAGE="${{ env.OPERATOR_RUNTIME_IMAGE }}" \
            -e MLFLOW_IMAGE="${{ env.MLFLOW_RUNTIME_IMAGE }}" \
            -e BACKEND_STORE="${BACKEND_STORE}" \
            -e REGISTRY_STORE="${REGISTRY_STORE}" \
            -e ARTIFACT_BACKENDS="${ARTIFACT_BACKENDS}" \
            -e SERVE_ARTIFACTS=true \
            -e AWS_ACCESS_KEY_ID="${{ env.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_S3_BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e upgrade_test_workspace="${{ env.UPGRADE_TEST_WORKSPACE }}" \
            -e TEST_RESULTS_DIR="/mlflow/results/pre" \
            "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}" \
            -m pre_upgrade

      - name: Run current-version post-upgrade validation phase
        shell: bash
        env:
          ARTIFACT_BACKENDS: ${{ matrix.artifact_storage }}
          BACKEND_STORE: ${{ matrix.backend_store }}
          REGISTRY_STORE: ${{ matrix.backend_store }}
        run: |
          docker run --rm --network host \
            -v "$HOME/.kube:/mlflow/.kube:ro,z" \
            -v "${{ github.workspace }}/test-results:/mlflow/results:z" \
            -e DEPLOY_MLFLOW_OPERATOR=false \
            -e SKIP_DEPLOYMENT=true \
            -e SKIP_CLEANUP=false \
            -e CLEANUP_REUSED_RESOURCES=on_success \
            -e NAMESPACE="${{ env.NAMESPACE }}" \
            -e MLFLOW_OPERATOR_IMAGE="${{ env.OPERATOR_RUNTIME_IMAGE }}" \
            -e MLFLOW_IMAGE="${{ env.MLFLOW_RUNTIME_IMAGE }}" \
            -e BACKEND_STORE="${BACKEND_STORE}" \
            -e REGISTRY_STORE="${REGISTRY_STORE}" \
            -e ARTIFACT_BACKENDS="${ARTIFACT_BACKENDS}" \
            -e SERVE_ARTIFACTS=true \
            -e AWS_ACCESS_KEY_ID="${{ env.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_S3_BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e upgrade_test_workspace="${{ env.UPGRADE_TEST_WORKSPACE }}" \
            -e TEST_RESULTS_DIR="/mlflow/results/post" \
            "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}" \
            -m post_upgrade

      - name: Upload current upgrade pytest reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: current-upgrade-pytest-validation-results-${{ matrix.backend_store }}-${{ matrix.artifact_storage }}
          path: test-results/
          retention-days: 7

      - name: Collect current upgrade pytest debug logs (operator namespace)
        if: ${{ failure() && !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/collect-debug-logs
        with:
          debug_namespace: ${{ env.NAMESPACE }}
          output_dir: debug-logs/operator-namespace

      - name: Collect current upgrade pytest debug logs (upgrade workspace)
        if: ${{ failure() && !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/collect-debug-logs
        with:
          debug_namespace: ${{ env.UPGRADE_TEST_WORKSPACE }}
          output_dir: debug-logs/upgrade-workspace

      - name: Upload current upgrade pytest debug logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: current-upgrade-pytest-validation-debug-logs-${{ matrix.backend_store }}-${{ matrix.artifact_storage }}
          path: debug-logs/
          retention-days: 7

  # Seeds a real MLflow 3.10.1 deployment, upgrades it to the PR-built images,
  # and validates post-upgrade state handoff against that reused deployment.
  seeded-upgrade-state-validation:
    needs: [build-mlflow-runtime-image, build-mlflow-operator-image, build-mlflow-tests-image]
    name: Validate seeded upgrade state handoff (${{ matrix.backend_store }}, ${{ matrix.artifact_storage }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        backend_store:
          - sqlite
          - postgres
        artifact_storage:
          - file
          - s3
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Free up disk space
        uses: kubeflow/pipelines/.github/actions/github-disk-cleanup@3004f974b571840bdb1ed6362c520d3cf566e9c0 # master

      - name: Create Kind cluster
        uses: ./.github/actions/create-cluster
        with:
          cluster_name: ${{ env.UPGRADE_VALIDATION_CLUSTER_NAME }}
          k8s_version: "v1.34.0"

      - name: Download MLflow operator image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.OPERATOR_RUNTIME_ARTIFACT }}
          path: operator-image

      - name: Load MLflow operator image into Kind cluster
        shell: bash
        run: |
          docker load -i "operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar"
          kind load docker-image "${{ env.OPERATOR_RUNTIME_IMAGE }}" --name "${{ env.UPGRADE_VALIDATION_CLUSTER_NAME }}"

      - name: Download MLflow runtime image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image

      - name: Load MLflow runtime image into Kind cluster
        shell: bash
        run: |
          docker load -i "runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar"
          kind load docker-image "${{ env.MLFLOW_RUNTIME_IMAGE }}" --name "${{ env.UPGRADE_VALIDATION_CLUSTER_NAME }}"

      - name: Download MLflow tests image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}
          path: test-image

      - name: Load MLflow tests image
        shell: bash
        run: docker load -i "test-image/${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}.tar"

      - name: Resolve operator Dockerfile
        id: resolve-operator-dockerfile
        shell: bash
        run: |
          if [[ -f Dockerfile.konflux ]]; then
            echo "path=Dockerfile.konflux" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build MLflow 3.10.1-compatible seed operator image
        env:
          SEED_OPERATOR_IMG: "localhost/mlflow-operator-upgrade-seed:v0.0.1"
        run: |
          docker build \
            --build-arg SUPPORTED_MLFLOW_VERSION_OVERRIDE=3.10.1 \
            -f "${{ steps.resolve-operator-dockerfile.outputs.path }}" \
            -t "${SEED_OPERATOR_IMG}" \
            .

      - name: Load seed operator image into Kind cluster
        env:
          SEED_OPERATOR_IMG: "localhost/mlflow-operator-upgrade-seed:v0.0.1"
        run: kind load docker-image "${SEED_OPERATOR_IMG}" --name "${{ env.UPGRADE_VALIDATION_CLUSTER_NAME }}"

      - name: Pull MLflow 3.10.1 seed image
        run: docker pull "${{ env.MLFLOW_SEED_SOURCE_IMAGE }}"

      - name: Retag MLflow 3.10.1 seed image locally
        run: docker tag "${{ env.MLFLOW_SEED_SOURCE_IMAGE }}" "${{ env.MLFLOW_SEED_IMAGE }}"

      - name: Load MLflow 3.10.1 seed image into Kind cluster
        run: kind load docker-image "${{ env.MLFLOW_SEED_IMAGE }}" --name "${{ env.UPGRADE_VALIDATION_CLUSTER_NAME }}"

      - name: Run pre-upgrade validation phase
        shell: bash
        env:
          ARTIFACT_BACKENDS: ${{ matrix.artifact_storage }}
          BACKEND_STORE: ${{ matrix.backend_store }}
          REGISTRY_STORE: ${{ matrix.backend_store }}
        run: |
          mkdir -p test-results
          docker run --rm --network host \
            -v "$HOME/.kube:/mlflow/.kube:ro,z" \
            -v "${{ github.workspace }}/test-results:/mlflow/results:z" \
            -e DEPLOY_MLFLOW_OPERATOR=false \
            -e SKIP_CLEANUP=true \
            -e NAMESPACE="${{ env.NAMESPACE }}" \
            -e MLFLOW_OPERATOR_IMAGE="localhost/mlflow-operator-upgrade-seed:v0.0.1" \
            -e MLFLOW_IMAGE="${{ env.MLFLOW_SEED_IMAGE }}" \
            -e BACKEND_STORE="${BACKEND_STORE}" \
            -e REGISTRY_STORE="${REGISTRY_STORE}" \
            -e ARTIFACT_BACKENDS="${ARTIFACT_BACKENDS}" \
            -e SERVE_ARTIFACTS=true \
            -e AWS_ACCESS_KEY_ID="${{ env.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_S3_BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e MLFLOW_TEST_SUPPORTED_VERSION=3.10 \
            -e upgrade_test_workspace="${{ env.UPGRADE_TEST_WORKSPACE }}" \
            -e TEST_RESULTS_DIR="/mlflow/results/pre" \
            "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}" \
            -m pre_upgrade

      - name: Upgrade seeded deployment in place
        shell: bash
        run: |
          kubectl set image deployment/mlflow-operator-controller-manager \
            manager="${{ env.OPERATOR_RUNTIME_IMAGE }}" \
            -n "${{ env.NAMESPACE }}"
          kubectl rollout status deployment/mlflow-operator-controller-manager \
            --timeout=300s \
            -n "${{ env.NAMESPACE }}"
          kubectl patch mlflow mlflow \
            -n "${{ env.NAMESPACE }}" \
            --type=merge \
            -p '{"spec":{"image":{"image":"${{ env.MLFLOW_RUNTIME_IMAGE }}","imagePullPolicy":"IfNotPresent"}}}'
          kubectl wait \
            --for="jsonpath={.status.version}=3.13.0" \
            mlflow/mlflow \
            --namespace "${{ env.NAMESPACE }}" \
            --timeout=300s
          kubectl rollout status deployment/mlflow \
            --timeout=300s \
            -n "${{ env.NAMESPACE }}"

      - name: Run post-upgrade validation phase
        shell: bash
        env:
          ARTIFACT_BACKENDS: ${{ matrix.artifact_storage }}
          BACKEND_STORE: ${{ matrix.backend_store }}
          REGISTRY_STORE: ${{ matrix.backend_store }}
        run: |
          # Reuse the upgraded seeded deployment so post_upgrade validates the
          # in-place handoff from the seeded source version to the PR-built target.
          docker run --rm --network host \
            -v "$HOME/.kube:/mlflow/.kube:ro,z" \
            -v "${{ github.workspace }}/test-results:/mlflow/results:z" \
            -e DEPLOY_MLFLOW_OPERATOR=false \
            -e SKIP_DEPLOYMENT=true \
            -e SKIP_CLEANUP=true \
            -e NAMESPACE="${{ env.NAMESPACE }}" \
            -e MLFLOW_OPERATOR_IMAGE="${{ env.OPERATOR_RUNTIME_IMAGE }}" \
            -e MLFLOW_IMAGE="${{ env.MLFLOW_RUNTIME_IMAGE }}" \
            -e BACKEND_STORE="${BACKEND_STORE}" \
            -e REGISTRY_STORE="${REGISTRY_STORE}" \
            -e ARTIFACT_BACKENDS="${ARTIFACT_BACKENDS}" \
            -e SERVE_ARTIFACTS=true \
            -e AWS_ACCESS_KEY_ID="${{ env.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ env.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_S3_BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e BUCKET="${{ env.AWS_S3_BUCKET }}" \
            -e upgrade_test_workspace="${{ env.UPGRADE_TEST_WORKSPACE }}" \
            -e TEST_RESULTS_DIR="/mlflow/results/post" \
            "${{ env.MLFLOW_TESTS_RUNTIME_IMAGE }}" \
            -m post_upgrade

      - name: Upload seeded upgrade validation reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: seeded-upgrade-state-validation-results-${{ matrix.backend_store }}-${{ matrix.artifact_storage }}
          path: test-results/
          retention-days: 7

      - name: Collect seeded upgrade validation debug logs (operator namespace)
        if: ${{ failure() && !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/collect-debug-logs
        with:
          debug_namespace: ${{ env.NAMESPACE }}
          output_dir: debug-logs/operator-namespace

      - name: Collect seeded upgrade validation debug logs (upgrade workspace)
        if: ${{ failure() && !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/collect-debug-logs
        with:
          debug_namespace: ${{ env.UPGRADE_TEST_WORKSPACE }}
          output_dir: debug-logs/upgrade-workspace

      - name: Upload seeded upgrade validation debug logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: seeded-upgrade-state-validation-debug-logs-${{ matrix.backend_store }}-${{ matrix.artifact_storage }}
          path: debug-logs/
          retention-days: 7

  upgrade-tests:
    needs: [build-mlflow-runtime-image, build-mlflow-operator-image]
    name: Run upgrade path (${{ matrix.backend_store }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        backend_store:
          - sqlite
          - postgres
    steps:
      - name: Clone the code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Free up disk space
        uses: kubeflow/pipelines/.github/actions/github-disk-cleanup@3004f974b571840bdb1ed6362c520d3cf566e9c0 # master

      - name: Resolve operator Dockerfile
        id: resolve-operator-dockerfile
        shell: bash
        run: |
          if [[ -f Dockerfile.konflux ]]; then
            echo "path=Dockerfile.konflux" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Create Kind cluster
        uses: ./.github/actions/create-cluster
        with:
          cluster_name: ${{ env.UPGRADE_CLUSTER_NAME }}
          k8s_version: "v1.34.0"

      - name: Download MLflow operator image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.OPERATOR_RUNTIME_ARTIFACT }}
          path: operator-image

      - name: Load operator image into Kind cluster
        run: |
          docker load -i "operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar"
          docker tag "${{ env.OPERATOR_RUNTIME_IMAGE }}" "${{ env.UPGRADE_OPERATOR_IMAGE }}"
          kind load docker-image "${{ env.UPGRADE_OPERATOR_IMAGE }}" --name ${{ env.UPGRADE_CLUSTER_NAME }}

      - name: Download MLflow runtime image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image

      - name: Load built MLflow image into Kind cluster
        shell: bash
        run: |
          docker load -i "runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar"
          kind load docker-image "${{ env.MLFLOW_RUNTIME_IMAGE }}" --name ${{ env.UPGRADE_CLUSTER_NAME }}

      - name: Build MLflow 3.10.1-compatible seed operator image
        env:
          SEED_OPERATOR_IMG: "localhost/mlflow-operator-upgrade-seed:v0.0.1"
        run: |
          docker build \
            --build-arg SUPPORTED_MLFLOW_VERSION_OVERRIDE=3.10.1 \
            -f "${{ steps.resolve-operator-dockerfile.outputs.path }}" \
            -t "${SEED_OPERATOR_IMG}" \
            .

      - name: Load seed operator image into Kind cluster
        env:
          SEED_OPERATOR_IMG: "localhost/mlflow-operator-upgrade-seed:v0.0.1"
        run: kind load docker-image "${SEED_OPERATOR_IMG}" --name ${{ env.UPGRADE_CLUSTER_NAME }}

      - name: Pull MLflow 3.10.1 seed image
        run: docker pull "${{ env.MLFLOW_SEED_SOURCE_IMAGE }}"

      - name: Retag MLflow 3.10.1 seed image locally
        run: docker tag "${{ env.MLFLOW_SEED_SOURCE_IMAGE }}" "${{ env.MLFLOW_SEED_IMAGE }}"

      - name: Load MLflow 3.10.1 seed image into Kind cluster
        run: kind load docker-image "${{ env.MLFLOW_SEED_IMAGE }}" --name ${{ env.UPGRADE_CLUSTER_NAME }}

      - name: Install deploy helper dependencies
        run: python3 -m pip install pyyaml kubernetes

      - name: Deploy seeded MLflow 3.10.1 instance
        shell: bash
        env:
          SEED_OPERATOR_IMG: "localhost/mlflow-operator-upgrade-seed:v0.0.1"
        run: |
          DEPLOY_ARGS=(
            --namespace "${{ env.NAMESPACE }}"
            --mlflow-operator-image "${SEED_OPERATOR_IMG}"
            --mlflow-image "${{ env.MLFLOW_SEED_IMAGE }}"
            --backend-store "${{ matrix.backend_store }}"
            --registry-store "${{ matrix.backend_store }}"
            --artifact-storage file
            --serve-artifacts true
          )

          python3 .github/actions/deploy/deploy.py "${DEPLOY_ARGS[@]}"

      - name: Wait for seeded MLflow 3.10.1 migration to complete
        shell: bash
        run: |
          kubectl wait --for=jsonpath='{.status.version}'=3.10.1 mlflow/mlflow --timeout=300s

      - name: Run upgrade e2e tests
        run: make test-e2e-upgrade E2E_IMG=${{ env.UPGRADE_OPERATOR_IMAGE }} MLFLOW_SEED_IMAGE=${{ env.MLFLOW_SEED_IMAGE }}
        env:
          MLFLOW_RUNTIME_IMAGE: ${{ env.MLFLOW_RUNTIME_IMAGE }}

      - name: Collect upgrade debug logs
        if: ${{ failure() && !cancelled() }}
        continue-on-error: true
        uses: ./.github/actions/collect-debug-logs
        with:
          debug_namespace: ${{ env.NAMESPACE }}

      - name: Upload upgrade debug logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: upgrade-debug-logs-${{ matrix.backend_store }}
          path: debug-logs/
          retention-days: 7
